<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OBORO NODE</title>

<style>

body{
background:#0a0a0a;
margin:0;
font-family:monospace;
color:#e5e5e5;
}

/* ACCESS GATE */

#accessGate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.gate-box{
background:#111;
border:1px solid #333;
padding:30px;
border-radius:8px;
width:260px;
text-align:center;
}

.gate-title{
margin-bottom:15px;
opacity:.7;
letter-spacing:1px;
}

.gate-btn{
width:100%;
margin-bottom:8px;
padding:8px;
background:#161616;
border:1px solid #333;
color:#fff;
cursor:pointer;
font-family:monospace;
}

.gate-btn:hover{
background:#222;
}

.gate-input{
width:100%;
margin-top:10px;
padding:8px;
background:#000;
border:1px solid #333;
color:#fff;
font-family:monospace;
}

/* TERMINAL */

.terminal-wrapper{
width:90%;
max-width:1200px;
margin:40px auto;
border:1px solid #333;
border-radius:8px;
overflow:hidden;
background:#111;
box-shadow:0 0 20px rgba(0,0,0,.6);
position:relative;
}

.terminal-header{
background:#1a1a1a;
padding:10px;
border-bottom:1px solid #333;
display:flex;
align-items:center;
gap:10px;
position:relative;
}

.dot{width:12px;height:12px;border-radius:50%;}
.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.terminal-title{flex:1;text-align:center;opacity:.7;}

.presence{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
font-size:12px;
padding:3px 8px;
border-radius:999px;
border:1px solid;
}

.presence.offline{color:#ff4d4d;border-color:#ff4d4d;}
.presence.anbu{color:#00e5ff;border-color:#00e5ff;}
.presence.muen{color:#ff3d81;border-color:#ff3d81;}
.presence.both{color:#b388ff;border-color:#b388ff;}

#main-grid{
display:flex;
height:80vh;
}

#left-terminal{
width:100%;
display:flex;
flex-direction:column;
}

#output{
flex:1;
overflow-y:auto;
padding:15px;
white-space:pre-wrap;
}

.line{margin:6px 0;}

.user-ANBU{color:#00e5ff;}   /* frio, cirúrgico */
.user-MUEN{color:#ff3d81;}   /* estranho, quase instável */
.user-SYSTEM{color:#ff4d4d;}

.terminal-input-area{
display:flex;
gap:10px;
padding:12px;
background:#1a1a1a;
border-top:1px solid #333;
}

#prompt{color:#00e676;font-weight:bold;}

#chatInput{
flex:1;
background:transparent;
border:1px solid #333;
color:#e5e5e5;
padding:8px;
font-family:monospace;
}

</style>
</head>

<body>

<!-- ACCESS SCREEN -->

<div id="accessGate">

<div class="gate-box">

<div class="gate-title">SELECIONE IDENTIDADE</div>

<button class="gate-btn" data-role="ANBU">ANBU</button>
<button class="gate-btn" data-role="MUEN">MUEN</button>
<button class="gate-btn" data-role="SYSTEM">SYSTEM</button>
<button class="gate-btn" data-role="GUEST">GUEST</button>

<div id="gateFields"></div>

</div>
</div>

<!-- TERMINAL -->

<div class="terminal-wrapper">

<div class="terminal-header">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div class="terminal-title">H40N - N.ROOT</div>
<span id="presenceIndicator" class="presence offline">OPERADORES OFF</span>
</div>

<div id="main-grid">

<div id="left-terminal">

<div id="output"></div>

<div class="terminal-input-area">
<div id="prompt">&gt;</div>
<input id="chatInput" placeholder="Digite algo..."/>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"ech0-chat-3d1f4.firebaseapp.com",
projectId:"ech0-chat-3d1f4",
appId:"1:307385370017:web:adc1b52765f34bf94177e0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ACCESS */

const PASS_ANBU="Kur0404";
const PASS_MUEN="0MU3N404";
const PASS_SYSTEM="root33";
const PASS_GUEST="guest33";

let currentUser=null;
let selectedRole=null;

const gate=document.getElementById("accessGate");
const gateFields=document.getElementById("gateFields");

document.querySelectorAll(".gate-btn").forEach(btn=>{
btn.onclick=()=>{
selectedRole=btn.dataset.role;
renderFields();
};
});

function renderFields(){

gateFields.innerHTML="";

if(selectedRole==="INTRUSO"){

gateFields.innerHTML=`
<input id="nickInput" class="gate-input" placeholder="nickname">
<input id="passInput" class="gate-input" type="password" placeholder="senha">
<button class="gate-btn" id="enterGate">ENTRAR</button>
`;

}else{

gateFields.innerHTML=`
<input id="passInput" class="gate-input" type="password" placeholder="senha">
<button class="gate-btn" id="enterGate">ENTRAR</button>
`;

}

document.getElementById("enterGate").onclick=validateAccess;

}

async function validateAccess(){

const pass=document.getElementById("passInput").value;

if(selectedRole==="ANBU" && pass!==PASS_ANBU) return alert("Senha inválida");
if(selectedRole==="MUEN" && pass!==PASS_MUEN) return alert("Senha inválida");
if(selectedRole==="GUEST" && pass!==PASS_GUEST) return alert("Senha inválida");
if(selectedRole==="SYSTEM" && pass!==PASS_SYSTEM) return alert("Senha inválida");

if(selectedRole==="INTRUSO"){

const nick=document.getElementById("nickInput").value.trim();
if(!nick) return alert("Escolha um nickname");

currentUser=nick;

}else{

currentUser=selectedRole;

}

if(currentUser==="ANBU" || currentUser==="MUEN"){

await addDoc(collection(db,"messages"),{
author:currentUser,
type:"LOGIN",
createdAt:serverTimestamp()
});

}

gate.style.display="none";

}

/* ELEMENTOS */

const output=document.getElementById("output");
const input=document.getElementById("chatInput");
const presenceIndicator=document.getElementById("presenceIndicator");

let operatorsOnline={ANBU:false,MUEN:false};

/* PRESENCE */

function updatePresenceUI(){

presenceIndicator.className="presence";

if(operatorsOnline.ANBU && operatorsOnline.MUEN){
presenceIndicator.textContent="ANBU + MUEN";
presenceIndicator.classList.add("both");
return;
}

if(operatorsOnline.ANBU){
presenceIndicator.textContent="ANBU ONLINE";
presenceIndicator.classList.add("anbu");
return;
}

if(operatorsOnline.MUEN){
presenceIndicator.textContent="MUEN ONLINE";
presenceIndicator.classList.add("muen");
return;
}

presenceIndicator.textContent="OPERADORES OFF";
presenceIndicator.classList.add("offline");

}

/* CHAT */

const q=query(collection(db,"messages"),orderBy("createdAt"));

onSnapshot(q,(snapshot)=>{

snapshot.docChanges().forEach(change=>{

if(change.type!=="added") return;

const data=change.doc.data();

if(data.type==="LOGIN"){
operatorsOnline[data.author]=true;
updatePresenceUI();
return;
}

if(data.type==="LOGOUT"){
operatorsOnline[data.author]=false;
updatePresenceUI();
return;
}

if(data.type==="CLEAR"){
output.innerHTML="";
return;
}

if(!data.text) return;

const line=document.createElement("div");

line.className="line user-"+data.author;

line.textContent=data.author+"> "+data.text;

output.appendChild(line);

output.scrollTop=output.scrollHeight;

});

});

/* INPUT */

input.addEventListener("keydown",async e=>{

if(e.key!=="Enter"||!input.value.trim()) return;

const raw=input.value.trim();

/* CLEAR */

if(raw==="/clear"){

if(currentUser!=="SYSTEMA"){
alert("Comando restrito ao SYSTEMA");
input.value="";
return;
}

await addDoc(collection(db,"messages"),{
author:"SYSTEM",
type:"CLEAR",
createdAt:serverTimestamp()
});

input.value="";
return;

}

/* LOGOUT */

if(raw==="/logout"){

if(currentUser==="NOAH" || currentUser==="ECH0"){

await addDoc(collection(db,"messages"),{
author:currentUser,
type:"LOGOUT",
createdAt:serverTimestamp()
});

}

gate.style.display="flex";

currentUser=null;

input.value="";
return;

}

/* MENSAGEM NORMAL */

await addDoc(collection(db,"messages"),{
author:currentUser,
text:raw,
createdAt:serverTimestamp()
});

input.value="";

});

</script>

</body>
</html>
